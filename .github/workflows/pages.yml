name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Prepare minimal deployment directory
        run: |
          mkdir -p public-site
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Install gong
        run: go install ./go/cmd/gong

      - name: Build process portable app
        run: |
          cd dsm/process/go/cmd/process
          gong portable
          cp process-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/process-app-portable.zip process-app-portable.html

      - name: Build reqif portable app
        run: |
          cd app/reqif/go/cmd/reqif
          gong portable
          cp reqif-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/reqif-app-portable.zip reqif-app-portable.html
          
      - name: Build statemachines portable app
        run: |
          cd dsm/statemachines/go/cmd/statemachines
          gong portable
          cp statemachines-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/statemachines-app-portable.zip statemachines-app-portable.html
          
      - name: Build barrgraph portable app
        run: |
          cd dsm/barrgraph/go/cmd/barrgraph
          gong portable
          cp barrgraph-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/barrgraph-app-portable.zip barrgraph-app-portable.html

      - name: Build capture portable app
        run: |
          cd dsm/capture/go/cmd/capture
          gong portable
          cp capture-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/capture-app-portable.zip capture-app-portable.html

      - name: Build structure portable app
        run: |
          cd dsm/structure/go/cmd/structure
          gong portable
          cp structure-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/structure-app-portable.zip structure-app-portable.html

      - name: Build scenario portable app
        run: |
          cd dsm/scenario/go/cmd/scenario
          gong portable
          cp scenario-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/scenario-app-portable.zip scenario-app-portable.html
          
      - name: Build project portable app
        run: |
          cd dsm/project/go/cmd/project
          gong portable
          cp project-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/project-app-portable.zip project-app-portable.html


      - name: Build svg portable app
        run: |
          cd lib/svg/go/cmd/svg
          gong portable
          cp svg-app-portable.html ../../../../../public-site/
          zip ../../../../../public-site/svg-app-portable.zip svg-app-portable.html

          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public-site'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4