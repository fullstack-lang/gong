<p>Before specific code</p>

@if (frontRepo) {
    <p>frontRepo is present</p>
    @if (frontRepo.array_Astructs) {
        <p>Number of Astructs: {{ frontRepo.array_Astructs.length }}</p>
        @for (astruct of frontRepo.array_Astructs; track astruct) {

            <button 
                mat-button
                color="primary"
                (click)="onClick($event, astruct)"
              >{{astruct.Name}}</button>
        }
    }
} @else {
    <p>frontRepo is NOT present</p>
}
