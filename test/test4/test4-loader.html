<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading Test 4 Portable App</title>
    <!-- Load fflate for fast browser-side unzipping -->
    <script src="https://unpkg.com/fflate@0.8.0/umd/index.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f0f0f0; overflow: hidden; }
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #app-frame { border: none; width: 100vw; height: 100vh; display: none; }
        .spinner { 
            border: 4px solid #ccc; border-top: 4px solid #0366d6; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <h2 id="status">Downloading app package...</h2>
        <p style="color: #666;">This might take a moment depending on your connection.</p>
    </div>
    
    <!-- The iframe where the unzipped HTML will be rendered -->
    <iframe id="app-frame"></iframe>

    <script>
        // ⚠️ REPLACE THIS with the URL you copied in Step 3
        const ZIP_URL = '<https://github.com/fullstack-lang/gong/releases/download/PortableAppV0.1/test4-portable-app.zip>';

        async function loadApp() {
            const statusEl = document.getElementById('status');
            try {
                // 1. Fetch the zip file from the GitHub Release
                const response = await fetch(ZIP_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                statusEl.innerText = 'Decompressing app...';
                
                // 2. Read it into an ArrayBuffer and convert to a byte array
                const arrayBuffer = await response.arrayBuffer();
                const zipData = new Uint8Array(arrayBuffer);

                // 3. Unzip the file synchronously using fflate
                const unzipped = fflate.unzipSync(zipData);
                
                // 4. Find the HTML file inside the unzipped archive
                const htmlFileName = Object.keys(unzipped).find(name => name.endsWith('.html'));
                if (!htmlFileName) throw new Error('Could not find an HTML file in the zip archive.');

                // 5. Decode the byte array back into an HTML text string
                const htmlText = fflate.strFromU8(unzipped[htmlFileName]);

                statusEl.innerText = 'Launching...';

                // 6. Render it inside the iframe using a Blob URL
                const blob = new Blob([htmlText], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                
                const iframe = document.getElementById('app-frame');
                iframe.src = blobUrl;
                
                // Hide loader and show the iframe
                document.getElementById('loader').style.display = 'none';
                iframe.style.display = 'block';

            } catch (error) {
                statusEl.innerText = 'Error loading app: ' + error.message;
                console.error(error);
            }
        }

        // Start the process immediately
        loadApp();
    </script>
</body>
</html>
